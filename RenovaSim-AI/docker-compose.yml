# ---------------------------------------------------------------------------
# docker-compose.yml
# Production-ready RenovaSim AI deployment
# ---------------------------------------------------------------------------

services:
  api:
    build: .
    container_name: renovasim-api
    ports:
      - "8000:8000"
    volumes:
      - ./renovasim.db:/app/renovasim.db
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s